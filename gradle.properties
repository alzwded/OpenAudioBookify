# Project-wide Gradle settings.

# AndroidX is the successor to the Android Support Library.
android.useAndroidX=true

# Jetifier is deprecated and usually unnecessary for modern projects.
android.enableJetifier=false

# Provide more memory to the Gradle daemon
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable parallel compilation and configuration caching for faster builds
org.gradle.parallel=true
org.gradle.configuration-cache=true
